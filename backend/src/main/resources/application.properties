# ═══════════════════════════════════════════════
# HRMS Platform — application.properties
# Enterprise Edition v2.0
# ═══════════════════════════════════════════════

spring.application.name=hrms-platform
server.port=8080
server.servlet.context-path=/api
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ── Database ──────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:hrms_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:9704300435}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.flyway.baseline-on-migrate=true

# HikariCP Connection Pool
spring.datasource.hikari.pool-name=HRMS-Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${JPA_DDL:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.default_batch_fetch_size=25
spring.jpa.open-in-view=false

# ── JWT Configuration ─────────────────────────────────────────────
jwt.secret=${JWT_SECRET:8Zz5tw0Ionm3XPZZfN0NOml3z9FMfmpgXwovR9fp6ryDIoGRM8EPHAB6iHsc0fb}
jwt.access-token.expiration=${JWT_ACCESS_EXPIRY:900000}
jwt.refresh-token.expiration=${JWT_REFRESH_EXPIRY:604800000}
jwt.issuer=hrms-platform

# ── Mail Configuration ────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@hrms.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.from.name=HRMS Platform
spring.mail.from.address=${MAIL_USERNAME:noreply@hrms.com}

# ── File Upload ───────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
file.upload.base-dir=${FILE_UPLOAD_DIR:uploads}
file.upload.profile-pictures=uploads/profiles
file.upload.documents=uploads/documents
file.upload.allowed-image-types=image/jpeg,image/png,image/webp
file.upload.allowed-doc-types=application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document

# ── Security Settings ─────────────────────────────────────────────
security.max-failed-attempts=5
security.lock-duration-minutes=30
security.otp-expiry-minutes=15
security.password-reset-expiry-minutes=60
security.email-verify-expiry-hours=24

# ── Rate Limiting ─────────────────────────────────────────────────
rate-limit.login.capacity=10
rate-limit.login.refill-minutes=1
rate-limit.api.capacity=100
rate-limit.api.refill-minutes=1

# ── Pagination Defaults ───────────────────────────────────────────
app.pagination.default-page-size=10
app.pagination.max-page-size=100

# ── CORS ──────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# ── Actuator / Monitoring ─────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

# ── SpringDoc / Swagger ───────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true

# ── Async Executor ────────────────────────────────────────────────
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=hrms-async-

# ── Logging ───────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.hrms=DEBUG
logging.level.org.hibernate.SQL=${LOG_SQL:WARN}
logging.file.name=logs/hrms-application.log
logging.file.max-size=50MB
logging.file.max-history=30
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{requestId}] %-5level %logger{36} - %msg%n

# ── Frontend URL (for email links) ────────────────────────────────
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.name=HRMS Platform
app.version=2.0.0
