version: '3.9'

# ══════════════════════════════════════════════════════
# HRMS Platform — Production Docker Compose
# Services: MySQL · Redis · Backend · Frontend (Nginx)
#            Prometheus · Grafana
# ══════════════════════════════════════════════════════

services:

  # ── MySQL ──────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: hrms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: hrms_db
      MYSQL_USER: ${DB_USERNAME:-hrmsuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-hrmspass}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docs/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost","-u","root","-p${DB_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [hrms-net]
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # ── Redis ──────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: hrms-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD","redis-cli","-a","${REDIS_PASSWORD:-redispass}","ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [hrms-net]

  # ── Spring Boot Backend ────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: hrms_db
      DB_USERNAME: ${DB_USERNAME:-hrmsuser}
      DB_PASSWORD: ${DB_PASSWORD:-hrmspass}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-minimum-32-chars-long}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-900000}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-604800000}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CORS_ORIGINS: http://localhost,http://frontend
      JPA_DDL: update
      JPA_SHOW_SQL: "false"
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    volumes:
      - uploads-data:/app/uploads
      - logs-data:/app/logs
    healthcheck:
      test: ["CMD-SHELL","curl -f http://localhost:8080/api/actuator/health/liveness || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks: [hrms-net]

  # ── React Frontend (Nginx) ─────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hrms-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    networks: [hrms-net]

  # ── Prometheus ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: hrms-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9090:9090"
    networks: [hrms-net]

  # ── Grafana ────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: hrms-grafana
    restart: unless-stopped
    depends_on: [prometheus]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: ${GRAFANA_URL:-http://localhost:3000}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    ports:
      - "3000:3000"
    networks: [hrms-net]

volumes:
  mysql-data:     driver: local
  redis-data:     driver: local
  uploads-data:   driver: local
  logs-data:      driver: local
  prometheus-data:driver: local
  grafana-data:   driver: local

networks:
  hrms-net:
    driver: bridge
